<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VER RESERVAS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Lista de Reservas</h2>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Habitación</th>
        <th>Inicio</th>
        <th>Fin</th>
        <th>Estado</th>
        <th>Total por noche</th>
      </tr>
    </thead>
    <tbody id="tabla-reservas"></tbody>
  </table>

  <div class="text-center mt-4">
    <a href="index.html" class="btn btn-secondary">Volver</a>
  </div>

  <div id="mensaje" class="alert mt-3 d-none"></div>

</div>

<script>

async function cargarReservas() {
  try {

    const res = await fetch('http://192.168.100.2/api/ordenes/reservas');
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const tbody = document.getElementById('tabla-reservas');
    tbody.innerHTML = '';

    data.forEach(r => {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td>${r.id_reserva}</td>
        <td>${r.id_cliente}</td>
        <td>${r.id_habitacion}</td>
        <td>${formatearFecha(r.fecha_inicio)}</td>
        <td>${formatearFecha(r.fecha_fin)}</td>
        <td>${r.estado}</td>
        <td>$${r.precio_total} </td>

      `;

      tbody.appendChild(row);
    });

  } catch (error) {
    console.error(error);
    mostrarMensaje("Error al cargar reservas", "danger");
  }
}

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

function formatearFecha(fechaISO) {
  const fecha = new Date(fechaISO);

  return fecha.toLocaleDateString('es-CO', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  });
}

// cargar automáticamente
cargarReservas();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VER HUÉSPEDES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Ver Huéspedes de una Reserva</h2>

  <form id="buscar-form" class="mb-4">
    <label class="form-label">ID Reserva</label>
    <input type="number" id="id_reserva" class="form-control mb-3" required>

    <button class="btn btn-primary">Buscar</button>
    <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
  </form>

  <div id="resultado" class="d-none">

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID Reserva</th>
          <th>ID Huésped</th>
          <th>ID Cliente</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody id="tabla-huespedes"></tbody>
    </table>

  </div>

  <div id="mensaje" class="alert d-none"></div>

</div>

<script>

document.getElementById('buscar-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const id = document.getElementById('id_reserva').value;

  try {

    const res = await fetch(`http://192.168.100.2/api/ordenes/reservas/${id}/huespedes`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    mostrarHuespedes(data);

  } catch (error) {
    console.error(error);
    mostrarMensaje("Error al obtener huéspedes", "danger");
    document.getElementById('resultado').classList.add('d-none');
  }

});

function mostrarHuespedes(lista) {
  const tbody = document.getElementById('tabla-huespedes');
  tbody.innerHTML = '';

  document.getElementById('resultado').classList.remove('d-none');

  lista.forEach(h => {
    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${h.id_reserva}</td>
      <td>${h.id_huesped_reserva}</td>
      <td>${h.id_cliente}</td>
      <td>${h.nombre}</td>
      <td>${h.email}</td>
      <td>${h.rol}</td>
    `;

    tbody.appendChild(row);
  });
}

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

</script>

</body>
</html>

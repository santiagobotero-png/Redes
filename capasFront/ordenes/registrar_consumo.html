<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REGISTRAR CONSUMO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Registrar Consumo</h2>

  <form id="consumo-form">

    <div class="mb-3">
      <label class="form-label">ID Reserva</label>
      <input type="number" id="id_reserva" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">ID Huésped Reserva</label>
      <input type="number" id="id_huesped_reserva" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">ID Servicio</label>
      <input type="number" id="id_servicio" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Cantidad</label>
      <input type="number" id="cantidad" class="form-control" min="1" required>
    </div>

    <button type="submit" class="btn btn-success">Registrar</button>
    <a href="index.html" class="btn btn-secondary ms-2">Volver</a>

  </form>

  <div id="mensaje" class="alert mt-4 d-none"></div>

</div>

<script>

document.getElementById('consumo-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const id_reserva = document.getElementById('id_reserva').value;
  const id_huesped_reserva = document.getElementById('id_huesped_reserva').value;
  const id_servicio = document.getElementById('id_servicio').value;
  const cantidad = document.getElementById('cantidad').value;

  try {

    const res = await fetch(`http://192.168.100.2/api/ordenes/reservas/${id_reserva}/servicios`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        id_servicio,
        cantidad,
        id_huesped_reserva
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    mostrarMensaje("Consumo registrado correctamente", "success");

    document.getElementById('consumo-form').reset();

  } catch (error) {
    console.error(error);
    mostrarMensaje("Error al registrar consumo", "danger");
  }

});

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

</script>

</body>
</html>

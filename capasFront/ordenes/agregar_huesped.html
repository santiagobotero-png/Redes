<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AGREGAR HUÉSPED</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Agregar Huésped a Reserva</h2>

  <form id="huesped-form">

    <div class="mb-3">
      <label class="form-label">ID Reserva</label>
      <input type="number" id="id_reserva" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">ID Cliente</label>
      <input type="number" id="id_cliente" class="form-control" required>
    </div>

    <!-- Rol implícito -->
    <input type="hidden" id="rol" value="acompanante">

    <button type="submit" class="btn btn-success">Agregar</button>
    <a href="index.html" class="btn btn-secondary ms-2">Volver</a>

  </form>

  <div id="mensaje" class="alert mt-4 d-none"></div>

</div>

<script>

document.getElementById('huesped-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const id_reserva = document.getElementById('id_reserva').value;
  const id_cliente = document.getElementById('id_cliente').value;
  const rol = document.getElementById('rol').value;

  try {

    const res = await fetch(`http://192.168.100.2/api/ordenes/reservas/${id_reserva}/huespedes`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        id_cliente,
        rol
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    mostrarMensaje("Huésped agregado correctamente", "success");

    document.getElementById('huesped-form').reset();

  } catch (error) {
    console.error(error);
    mostrarMensaje("Error al agregar huésped", "danger");
  }

});

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

</script>

</body>
</html>

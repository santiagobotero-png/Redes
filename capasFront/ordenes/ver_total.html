<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VER TOTAL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Total de Reserva</h2>

  <form id="form">
    <input type="number" id="id_reserva" class="form-control mb-3" placeholder="ID Reserva" required>

    <button class="btn btn-primary">Calcular</button>
    <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
  </form>

  <div id="resultado" class="card mt-4 d-none">
    <div class="card-body">

      <p><strong>Total Habitación:</strong> $<span id="t_habitacion"></span></p>
      <p><strong>Total Servicios:</strong> $<span id="t_servicios"></span></p>

      <hr>

      <h4><strong>Total General:</strong> $<span id="t_total"></span></h4>

    </div>
  </div>

  <div id="mensaje" class="alert mt-3 d-none"></div>

</div>

<script>

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const id = document.getElementById('id_reserva').value;

  try {

    const res = await fetch(`http://192.168.100.2/api/ordenes/reservas/${id}/total`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    document.getElementById('resultado').classList.remove('d-none');

    document.getElementById('t_habitacion').textContent = data.total_habitacion;
    document.getElementById('t_servicios').textContent = data.total_servicios;
    document.getElementById('t_total').textContent = data.total;

  } catch (error) {
    mostrarMensaje("Error al calcular total", "danger");
  }

});

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CREAR RESERVA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏨 ÓRDENES</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center mb-4">Crear Nueva Reserva</h2>

  <form id="reserva-form">

    <div class="mb-3">
      <label class="form-label">ID Cliente</label>
      <input type="number" id="id_cliente" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">ID Habitación</label>
      <input type="number" id="id_habitacion" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Fecha Inicio</label>
      <input type="date" id="fecha_inicio" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Fecha Fin</label>
      <input type="date" id="fecha_fin" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Crear Reserva</button>
    <a href="index.html" class="btn btn-secondary ms-2">Volver</a>

  </form>

  <div id="mensaje" class="alert mt-4 d-none"></div>

</div>

<script>

document.getElementById('reserva-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const id_cliente = document.getElementById('id_cliente').value;
  const id_habitacion = document.getElementById('id_habitacion').value;
  const fecha_inicio = document.getElementById('fecha_inicio').value;
  const fecha_fin = document.getElementById('fecha_fin').value;

  // ⚠️ Validación básica importante
  if (fecha_fin <= fecha_inicio) {
    mostrarMensaje("La fecha fin debe ser mayor que la fecha inicio", "danger");
    return;
  }

  fetch('http://192.168.100.2/api/ordenes/reservas', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      id_cliente,
      id_habitacion,
      fecha_inicio,
      fecha_fin
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.error) throw new Error(data.error);

    mostrarMensaje("Reserva creada correctamente", "success");

    document.getElementById('reserva-form').reset();

  })
  .catch(err => {
    mostrarMensaje("Error al crear reserva", "danger");
    console.error(err);
  });

});

function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  mensaje.classList.remove('d-none', 'alert-success', 'alert-danger');
  mensaje.classList.add('alert', `alert-${tipo}`);
  mensaje.textContent = texto;
}

</script>

</body>
</html>

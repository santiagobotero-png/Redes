  <div class="container mt-5">
    <h2 class="text-center mb-4">Eliminar Habitación</h2>

    <form id="borrar-form">
      <label for="id" class="form-label">ID de la habitación a eliminar</label>

      <input 
        type="number" 
        id="id" 
        class="form-control mb-3" 
        placeholder="Ingrese el ID de la habitación"
        required
      >

      <button type="submit" class="btn btn-danger">Eliminar</button>
      <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
    </form>

    <div id="mensaje" class="alert mt-4 d-none"></div>
  </div>

  <script>
    document.getElementById('borrar-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('id').value;

      fetch(`http://192.168.100.2/api/habitaciones/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(data => {
          const mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-danger');
          mensaje.classList.add('alert', 'alert-success');
          mensaje.textContent = 'Habitacion eliminada con éxito';
        })
        .catch(err => {
          const mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-success');
          mensaje.classList.add('alert', 'alert-danger');
          mensaje.textContent = 'Error al eliminar la habitacion';
        });
    });
  </script>
</body>

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🏪 Almacén</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="ver_habitaciones.html">VER HABITACIONES</a></li>
        <li class="nav-item"><a class="nav-link" href="ver_servicios.html">VER SERVICIOS</a></li>
        <li class="nav-item"><a class="nav-link" href="insertar_habitaciones.html">INSERTAR HABITACIONES</a></li>
        <li class="nav-item"><a class="nav-link" href="insertar_servicios.html">INSERTAR SERVICIOS</a></li>
        <li class="nav-item"><a class="nav-link" href="consultar_habitaciones.html">CONSULTAR HABITACIONES</a></li>

      </ul>
    </div>
  </div>
</nav>

  <div class="container mt-5">
    <h2 class="text-center mb-4">INSERTAR NUEVO SERVICIO</h2>
    <form id="servicio-form">

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre del Servicio</label>
        <input type="text" class="form-control" id="nombre" required />
      </div>

      <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea class="form-control" id="descripcion"></textarea>
      </div>

      <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
      <input type="number" step="0.01" class="form-control" id="precio" required>
      </div>

      <div class="mb-3">
        <label for="disponibilidad" class="form-label">Disponibilidad</label>
      <select class="form-control" id="disponibilidad">
        <option value="disponible">Sí</option>
        <option value="no disponible">No</option>
      </select>
      </div>

      <button type="submit" class="btn btn-success">Guardar</button>
      <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
    </form>

    <div id="mensaje" class="alert mt-4 d-none"></div>
  </div>

  <script>
    document.getElementById('servicio-form').addEventListener('submit', function (e) {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value;
    const descripcion = document.getElementById('descripcion').value;
    const precio = document.getElementById('precio').value;
    const disponibilidad = document.getElementById('disponibilidad').value;

    fetch('http://192.168.100.2/api/servicios', {
        method: 'POST',
        headers: {
        'Content-Type': 'application/json'
        },
        body: JSON.stringify({ nombre, descripcion, precio, disponibilidad })
    })
    .then(response => response.json())
    .then(data => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-danger');
        mensaje.classList.add('alert', 'alert-success');
        mensaje.textContent = 'Servicio creado exitosamente';

        document.getElementById('servicio-form').reset();
    })
    .catch(error => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-success');
        mensaje.classList.add('alert', 'alert-danger');
        mensaje.textContent = 'Error al crear servicio';
    });
    });
  </script>
</body>
</html>

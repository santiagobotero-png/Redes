  <div class="container mt-5">
    <h2 class="text-center mb-4">EDITAR SERVICIO</h2>

    <form id="buscar-form" class="mb-4">
        <label for="id-buscar" class="form-label">Ingrese el ID del servicio a editar</label>
        <input type="number" id="id-buscar" class="form-control mb-3" required>
        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <form id="editar-form" class="d-none">

        <div class="mb-3">
        <label for="nombre" class="form-label">Nombre del Servicio</label>
        <input type="text" id="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea id="descripcion" class="form-control"></textarea>
        </div>

        <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
        <input type="number" step="0.01" id="precio" class="form-control" required>
        </div>

        <div class="mb-3">
        <label for="disponibilidad" class="form-label">Disponibilidad</label>
        <select id="disponibilidad" class="form-control">
            <option value="si">Sí</option>
            <option value="no">No</option>
        </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar Cambios</button>
        <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
    </form>

    <div id="mensaje" class="alert mt-4 d-none"></div>
  </div>

  <script>
    let servicioId = null;

    document.getElementById('buscar-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('id-buscar').value;

      fetch(`http://192.168.100.2/api/servicios/${id}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) throw new Error(data.error);
          servicioId = data.id;
          document.getElementById('nombre').value = data.nombre;
          document.getElementById('descripcion').value = data.descripcion;
          document.getElementById('precio').value = data.precio;
          document.getElementById('disponibilidad').value = data.disponibilidad;

          document.getElementById('editar-form').classList.remove('d-none');
        })
        .catch(err => {
          const mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-success');
          mensaje.classList.add('alert', 'alert-danger');
          mensaje.textContent = 'Servicio no encontrado';
        });
    });

    document.getElementById('editar-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const descripcion = document.getElementById('descripcion').value;
      const precio = document.getElementById('precio').value;
      const disponibilidad = document.getElementById('disponibilidad').value;

      fetch(`http://192.168.100.2/api/servicios/${servicioId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, descripcion, precio, disponibilidad })
      })
      .then(res => res.json())
      .then(data => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-danger');
        mensaje.classList.add('alert', 'alert-success');
        mensaje.textContent = 'El servicio se ha actualizado correctamente';
      })
      .catch(err => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-success');
        mensaje.classList.add('alert', 'alert-danger');
        mensaje.textContent = 'Error al actualizar el servicio';
      });
    });
  </script>
</body>

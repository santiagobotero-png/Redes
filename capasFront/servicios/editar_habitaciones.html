<body>

  <div class="container mt-5">
    <h2 class="text-center mb-4">EDITAR HABITACIÓN</h2>

    <form id="buscar-form" class="mb-4">
      <label for="id-buscar" class="form-label">Ingrese el ID de la habitación a editar</label>
      <input type="number" id="id-buscar" class="form-control mb-3" required>
      <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <form id="editar-form" class="d-none">

      <div class="mb-3">
        <label for="numero_habitacion" class="form-label">Número de Habitación</label>
        <input type="number" id="numero_habitacion" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="piso" class="form-label">Piso</label>
        <input type="number" id="piso" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="tipo" class="form-label">Tipo</label>
        <input type="text" id="tipo" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="capacidad" class="form-label">Capacidad</label>
        <input type="number" id="capacidad" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
        <input type="number" step="0.01" id="precio" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="estado" class="form-label">Estado</label>
        <select id="estado" class="form-control">
          <option value="disponible">Disponible</option>
          <option value="ocupado">Ocupado</option>
          <option value="mantenimiento">Mantenimiento</option>
        </select>
      </div>

      <button type="submit" class="btn btn-success">Guardar Cambios</button>
      <a href="index.html" class="btn btn-secondary ms-2">Volver</a>
    </form>

    <div id="mensaje" class="alert mt-4 d-none"></div>
  </div>

  <script>
    let habitacionId = null;

    document.getElementById('buscar-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('id-buscar').value;

      fetch(`http://192.168.100.2/api/habitaciones/${id}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) throw new Error(data.error);
          habitacionId = data.id;
          document.getElementById('numero_habitacion').value = data.numero_habitacion;
          document.getElementById('piso').value = data.piso;
          document.getElementById('tipo').value = data.tipo;
          document.getElementById('capacidad').value = data.capacidad;
          document.getElementById('precio').value = data.precio;
          document.getElementById('estado').value = data.estado;//En caso de que el recepcionista haga la reservación para el cliente o simplemente cancelen la reservación.

          document.getElementById('editar-form').classList.remove('d-none');
        })
        .catch(err => {
          const mensaje = document.getElementById('mensaje');
          mensaje.classList.remove('d-none', 'alert-success');
          mensaje.classList.add('alert', 'alert-danger');
          mensaje.textContent = 'Habitación no encontrada';
        });
    });

    document.getElementById('editar-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const numero_habitacion = document.getElementById('numero_habitacion').value;
      const piso = document.getElementById('piso').value;
      const tipo = document.getElementById('tipo').value;
      const capacidad = document.getElementById('capacidad').value;
      const precio = document.getElementById('precio').value;
      const estado = document.getElementById('estado').value;

      fetch(`http://192.168.100.2/api/habitaciones/${habitacionId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numero_habitacion, piso, tipo, capacidad, precio, estado })
      })
      .then(res => res.json())
      .then(data => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-danger');
        mensaje.classList.add('alert', 'alert-success');
        mensaje.textContent = 'La habitación ha sido actualizada exitosamente';
      })
      .catch(err => {
        const mensaje = document.getElementById('mensaje');
        mensaje.classList.remove('d-none', 'alert-success');
        mensaje.classList.add('alert', 'alert-danger');
        mensaje.textContent = 'Error al actualizar habitación';
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel Recepcionista</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<button class="btn btn-secondary mb-3" onclick="cerrarSesion()">
Cerrar sesión
</button>

<h2 class="mb-4">Panel Recepcionista</h2>

<div class="card p-4 shadow">

<h5>Buscar huésped por ID</h5>

<div class="input-group mt-3">

<input type="number" id="idHuesped" class="form-control" placeholder="Ingrese ID del huésped">

<button class="btn btn-primary" onclick="buscarHuesped()">
Buscar
</button>

</div>

</div>

<div class="card mt-4 p-4 shadow">

<h5>Información del huésped</h5>

<table class="table mt-3">

<tr>
<th>ID</th>
<td id="res_id"></td>
</tr>

<tr>
<th>Usuario</th>
<td id="res_username"></td>
</tr>

<tr>
<th>Email</th>
<td id="res_email"></td>
</tr>

<tr>
<th>Nombre</th>
<td id="res_nombre"></td>
</tr>

<tr>
<th>Rol</th>
<td id="res_rol"></td>
</tr>

</table>

</div>

</div>

<script src="js/recepcionista.js"></script>

<script>
function cerrarSesion(){
localStorage.clear();
window.location.href = "login.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel Administrador</title>

<button class="btn btn-secondary mb-3" onclick="cerrarSesion()">
Cerrar sesión
</button>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Panel de Administrador</h2>

<button class="btn btn-success mb-3" onclick="mostrarFormulario()">
Crear Usuario
</button>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Usuario</th>
<th>Email</th>
<th>Nombre</th>
<th>Rol</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaUsuarios">
</tbody>

</table>

</div>

<!-- Modal Usuario -->

<div class="modal fade" id="modalUsuario" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Usuario</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="username" class="form-control mb-2" placeholder="Usuario">

<input id="password" class="form-control mb-2" placeholder="Password">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="nombre" class="form-control mb-2" placeholder="Nombre completo">

<select id="rol" class="form-control mb-2">

<option value="ADMIN">ADMIN</option>
<option value="RECEPCIONISTA">RECEPCIONISTA</option>
<option value="HUESPED">HUESPED</option>

</select>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancelar
</button>

<button class="btn btn-success" onclick="crearUsuario()">
Guardar
</button>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Principal - Hotel Royal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">🏨 HOTEL ROYAL</span>
    <button class="btn btn-light" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</nav>

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header text-center bg-primary text-white">
      <h3>Panel de Control</h3>
    </div>

    <div class="card-body text-center">

      <p id="bienvenida"></p>

      <hr>

      <div id="opciones" class="d-grid gap-3 col-6 mx-auto">
        <!-- Opciones dinámicas -->
      </div>

    </div>

    <div class="card-footer text-center text-muted">
      <small>Sistema distribuido - Microservicios</small>
    </div>

  </div>

</div>

<script>
  // 🔹 Obtener usuario
  const usuario = JSON.parse(localStorage.getItem("usuario"));

  // 🔹 Proteger acceso
  if (!usuario) {
    window.location.href = "login.html";
  }

  // 🔹 Mostrar nombre
  document.getElementById("bienvenida").textContent =
    "Bienvenido, " + usuario.nombre + " (" + usuario.rol + ")";

  const contenedor = document.getElementById("opciones");

  // 🔹 Render según rol
  if (usuario.rol === "ADMIN") {

    contenedor.innerHTML = `
      <a href="usuarios/dashboard.html" class="btn btn-outline-primary">
        👤 Gestión de Usuarios
      </a>

      <a href="servicios/index.html" class="btn btn-outline-success">
        🛏️ Habitaciones y Servicios
      </a>

      <a href="ordenes/index.html" class="btn btn-outline-warning">
        📋 Órdenes y Reservas
      </a>

      <a 
      href="http://192.168.100.2:8501" 
      target="_blank"
      class="btn btn-outline-dark"
      >
      📊 Dashboard Analítico
      </a>
    `;

  } else if (usuario.rol === "RECEPCIONISTA") {

    contenedor.innerHTML = `
      <a href="servicios/index.html" class="btn btn-outline-success">
        🛏️ Habitaciones y Servicios
      </a>

      <a href="ordenes/index.html" class="btn btn-outline-warning">
        📋 Órdenes y Reservas
      </a>
    `;

  } else if (usuario.rol === "HUESPED") {

    contenedor.innerHTML = `
      <a href="ordenes/ver_reserva.html" class="btn btn-outline-info">
        📄 Mis Reservas
      </a>

      <a href="ordenes/ver_total.html" class="btn btn-outline-info">
        💰 Mis Consumos
      </a>
    `;

  }

  // 🔹 Logout
  function cerrarSesion() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
